<!DOCTYPE html>
<html>
<head>
    <title>Web Mirror</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #fafafa; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
        input { width: 75%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        button { padding: 12px 20px; background: #000; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        #output { margin-top: 20px; border: 1px solid #eee; width: 100%; height: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="urlInput" placeholder="https://example.com">
        <button onclick="loadSite()">Go</button>
        <iframe id="output" srcdoc="Site will appear here..."></iframe>
    </div>

    <script>
        async function loadSite() {
            const target = document.getElementById('urlInput').value;
            const frame = document.getElementById('output');
            
            // This calls YOUR Vercel serverless function
            const res = await fetch(`/api/proxy?url=${encodeURIComponent(target)}`);
            const html = await res.text();
            frame.srcdoc = html;
        }
    </script>
</body>
</html>
