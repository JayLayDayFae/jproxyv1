<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: 'Inter', sans-serif; background: #fafafa; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 700px; }
        input { width: 80%; padding: 12px; border: 1px solid #eee; border-radius: 6px; margin-right: 10px; }
        button { padding: 12px 24px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        iframe { width: 100%; height: 600px; border: 1px solid #f0f0f0; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <input type="text" id="url" placeholder="https://example.com">
        <button onclick="go()">Browse</button>
        <iframe id="view"></iframe>
    </div>
    <script>
        async function go() {
            const target = document.getElementById('url').value;
            const view = document.getElementById('view');
            view.srcdoc = "Loading through fresh proxy...";
            const res = await fetch(`/api/proxy?url=${encodeURIComponent(target)}`);
            view.srcdoc = await res.text();
        }
    </script>
</body>
</html>
